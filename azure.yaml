name: serverless-expense-agent
metadata:
  template: serverless-expense-agent@1.0.0
services:
  api:
    project: ./src
    language: python
    host: function
# After the storage account is provisioned, upload the bundled policy documents to the
# `policies` blob container so they're present right after `azd up` — the customer never
# runs a manual seed step. Implemented with the az CLI (already required for this sample)
# so the hook needs no Python packages. It seeds only when the container is empty, so a
# re-provision never overwrites an operator's edited policy, and continueOnError keeps an
# RBAC-propagation hiccup from failing the deploy (the agent also seeds lazily on its first
# run, so the policies are guaranteed either way).
hooks:
  postprovision:
    posix:
      shell: sh
      continueOnError: true
      interactive: false
      run: |
        existing=$(az storage blob list --account-name "$OUTPUT_STORAGE_ACCOUNT" --auth-mode login -c policies --query "length(@)" -o tsv 2>/dev/null || echo 0)
        if [ "${existing:-0}" = "0" ]; then
          az storage blob upload-batch --account-name "$OUTPUT_STORAGE_ACCOUNT" --auth-mode login -d policies -s src/policies --pattern "*.md" --only-show-errors
          echo "Seeded expense policies to '$OUTPUT_STORAGE_ACCOUNT/policies'."
        else
          echo "Policies already present in '$OUTPUT_STORAGE_ACCOUNT/policies' ($existing); skipping seed."
        fi
    windows:
      shell: pwsh
      continueOnError: true
      interactive: false
      run: |
        $existing = az storage blob list --account-name $env:OUTPUT_STORAGE_ACCOUNT --auth-mode login -c policies --query "length(@)" -o tsv 2>$null
        if (-not $existing -or $existing -eq "0") {
          az storage blob upload-batch --account-name $env:OUTPUT_STORAGE_ACCOUNT --auth-mode login -d policies -s src/policies --pattern "*.md" --only-show-errors
          Write-Host "Seeded expense policies to '$($env:OUTPUT_STORAGE_ACCOUNT)/policies'."
        } else {
          Write-Host "Policies already present in '$($env:OUTPUT_STORAGE_ACCOUNT)/policies' ($existing); skipping seed."
        }
