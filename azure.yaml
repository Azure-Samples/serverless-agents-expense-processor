name: serverless-expense-agent
metadata:
  template: serverless-expense-agent@1.0.0
services:
  api:
    project: ./src
    language: python
    host: function
    hooks:
      # Generate src/requirements.txt from src/pyproject.toml + src/uv.lock right before
      # packaging, so the Functions remote build (Oryx) has one while deps stay defined in
      # pyproject.toml. The file is gitignored — uv is the single source of truth.
      prepackage:
        posix:
          shell: sh
          continueOnError: false
          run: uv export --format requirements-txt --no-hashes --no-dev --no-emit-project -o requirements.txt
        windows:
          shell: pwsh
          continueOnError: false
          run: uv export --format requirements-txt --no-hashes --no-dev --no-emit-project -o requirements.txt
# Seed policies and submit demo messages with the Azure SDK. DefaultAzureCredential
# uses the identity established by azd, so Azure CLI is not required.
hooks:
  postprovision:
    posix:
      shell: sh
      continueOnError: true
      interactive: false
      run: uv run scripts/setup_demo.py seed-policies
    windows:
      shell: pwsh
      continueOnError: true
      interactive: false
      run: uv run scripts/setup_demo.py seed-policies
  postup:
    posix:
      shell: sh
      continueOnError: true
      interactive: false
      run: uv run scripts/setup_demo.py send-samples
    windows:
      shell: pwsh
      continueOnError: true
      interactive: false
      run: uv run scripts/setup_demo.py send-samples
